name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"   # runs daily at 4am UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Update SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commit changes
        run: |
          git add dark_mode.svg light_mode.svg cache/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git config --global user.email "github-actions-bot@github.com"
          git config --global user.name "README-Bot"
          git commit -m "Updated README stats"
          git push
